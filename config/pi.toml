# ClawOS configuration optimized for Raspberry Pi
# Lower resource usage, shorter intervals

[clawos]
log_level = "info"
data_dir = "/var/lib/clawos"

[http]
bind = "0.0.0.0"
port = 7070

[mqtt]
port = 1883
max_connections = 20

[chain]
dry_run = true
rpc_url = "ws://127.0.0.1:9944"
key_path = "/etc/clawos/agent.key"

[watchdog]
check_interval_secs = 15
heartbeat_timeout_secs = 45
auto_restart = true
max_restarts = 3
