name: claw-forge bot

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  claw-forge:
    name: Run claw-forge
    # Only trigger when a comment on an issue (not a PR) contains @claw-forge
    if: |
      github.event.issue.pull_request == null &&
      contains(github.event.comment.body, '@claw-forge')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install claw-forge
        run: uv pip install "claw-forge==0.5.6"

      - name: Configure Git
        run: |
          git config --global user.name "claw-forge bot"
          git config --global user.email "actions@github.com"

      - name: Run claw-forge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_SETUP_TOKEN: ${{ secrets.ANTHROPIC_SETUP_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"

          claw-forge run \
            --github-mode "${REPO_OWNER}/${REPO_NAME}#${ISSUE_NUMBER}" \
            --plan-model claude-opus-4-6 \
            --model claude-sonnet-4-6 \
            --concurrency 2 \
            --task coding

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '❌ **claw-forge run failed**',
                '',
                'Check the [workflow logs](' +
                  `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}` +
                  `/actions/runs/${context.runId}) for details.`,
              ].join('\n')
            })
